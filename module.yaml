name: course-cli
title: CLI-инструмент для структурирования курса
type: teacher-side
status: MVP
problem: Преподаватели создают курсы без стандартизированной структуры и метаданных.
hypothesis: Если при создании курса автоматически задавать шаблон структуры, преподаватели будут формировать более последовательные курсы.
primary_user: Преподаватель (автор курса)
inputs:
  - название курса
  - список учебных результатов (learning outcomes)
outputs:
  - папка с файлами курса (структура каталогов, course.yaml)
  - отчёт о валидации курса
  - xAPI-события
primary_interface: CLI (командная строка)